name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # affected needs full history so Nx can compute the diff base.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Derive correct base/head SHAs for `nx affected` on both push and PR.
      - uses: nrwl/nx-set-shas@v4

      # Only lint/test/build projects affected by the change. With NX_CLOUD_ACCESS_TOKEN
      # set as a repo secret, Nx Cloud remote caching replays unchanged tasks.
      - run: pnpm exec nx affected -t lint test build
