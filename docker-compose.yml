# One-command run of the whole polyglot stack:
#
#   docker compose up --build
#
# Then:
#   - Angular shop  -> http://localhost:4200
#   - React admin   -> http://localhost:4201
#   - Express API   -> http://localhost:3333/api/products
#
# Both frontends call a relative /api, which their nginx proxies to the api
# service — so there is no CORS and no per-environment rebuild.
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3333:3333'
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3333

  shop:
    build:
      context: .
      dockerfile: apps/shop/Dockerfile
    ports:
      - '4200:80'
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - '4201:80'
    depends_on:
      - api
