# Shared nginx config for the two static frontends (shop, admin).
#
# Two responsibilities:
#   1. Serve the SPA with a history-API fallback (any unknown path -> index.html
#      so client-side routing works on refresh / deep links).
#   2. Reverse-proxy /api to the Express API container, so the browser only ever
#      talks to a same-origin /api path. This is exactly why the frontends use a
#      relative `/api` base URL in code — the same bundle works in dev (Vite/
#      Angular proxy config) and in Docker (this nginx) with no rebuild.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api:3333;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
